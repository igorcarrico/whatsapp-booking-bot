<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arena Beach Bot - Chat</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #e5ddd5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .chat-container {
      width: 100%;
      max-width: 500px;
      height: 95vh;
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .chat-header {
      background: #075e54;
      color: white;
      padding: 16px 20px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .chat-header .avatar {
      width: 42px;
      height: 42px;
      background: #25d366;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
    }
    .chat-header .info h2 { font-size: 16px; font-weight: 600; }
    .chat-header .info p { font-size: 12px; opacity: 0.8; }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: #e5ddd5 url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect fill="%23d4ccb5" width="100" height="100" opacity="0.1"/></svg>');
    }
    .message {
      max-width: 80%;
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.5;
      word-wrap: break-word;
      white-space: pre-wrap;
    }
    .message.user {
      align-self: flex-end;
      background: #dcf8c6;
      border-bottom-right-radius: 2px;
    }
    .message.bot {
      align-self: flex-start;
      background: #fff;
      border-bottom-left-radius: 2px;
      box-shadow: 0 1px 1px rgba(0,0,0,0.1);
    }
    .message .time {
      font-size: 11px;
      color: #999;
      text-align: right;
      margin-top: 4px;
    }
    .typing {
      align-self: flex-start;
      background: #fff;
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      color: #999;
      display: none;
    }
    .typing.active { display: block; }
    .chat-input {
      display: flex;
      gap: 8px;
      padding: 12px;
      background: #f0f0f0;
      border-top: 1px solid #ddd;
    }
    .chat-input input {
      flex: 1;
      padding: 10px 16px;
      border: none;
      border-radius: 24px;
      font-size: 15px;
      outline: none;
      background: #fff;
    }
    .chat-input button {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 50%;
      background: #075e54;
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .chat-input button:hover { background: #064e46; }
    .chat-input button:disabled { background: #999; cursor: not-allowed; }
    .phone-bar {
      background: #f0f0f0;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: #666;
      border-top: 1px solid #ddd;
    }
    .phone-bar input {
      flex: 1;
      padding: 6px 12px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="chat-container">
    <div class="chat-header">
      <div class="avatar">🏖️</div>
      <div class="info">
        <h2>Arena Beach Bot</h2>
        <p>Online</p>
      </div>
    </div>

    <div class="chat-messages" id="messages">
      <div class="message bot">
        Envie uma mensagem para comecar! Tente: "Oi, quero reservar uma quadra"
        <div class="time">agora</div>
      </div>
    </div>
    <div class="typing" id="typing">Digitando...</div>

    <div class="chat-input">
      <input type="text" id="input" placeholder="Digite sua mensagem..." autofocus>
      <button id="send" onclick="sendMessage()">&#9658;</button>
    </div>

    <div class="phone-bar">
      <span>Seu telefone:</span>
      <input type="text" id="phone" value="5511999990000">
    </div>
  </div>

  <script>
    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const typingEl = document.getElementById('typing');
    const sendBtn = document.getElementById('send');

    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !sendBtn.disabled) sendMessage();
    });

    function getTime() {
      return new Date().toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
    }

    function addMessage(text, type) {
      const div = document.createElement('div');
      div.className = `message ${type}`;
      div.innerHTML = `${text}<div class="time">${getTime()}</div>`;
      messagesEl.appendChild(div);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      const phone = document.getElementById('phone').value.trim();
      addMessage(text, 'user');
      inputEl.value = '';
      sendBtn.disabled = true;
      typingEl.classList.add('active');

      try {
        const res = await fetch('/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phone, message: text }),
        });
        const data = await res.json();
        addMessage(data.reply || data.error || 'Erro desconhecido', 'bot');
      } catch (err) {
        addMessage('Erro de conexao com o servidor.', 'bot');
      }

      typingEl.classList.remove('active');
      sendBtn.disabled = false;
      inputEl.focus();
    }
  </script>
</body>
</html>
